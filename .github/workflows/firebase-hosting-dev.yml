name: Deploy PR to Firebase preview channel

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm

      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_NAVER_CLIENT_ID: ${{ secrets.VITE_NAVER_CLIENT_ID }}
          VITE_NAVER_CLIENT_SECRET: ${{ secrets.VITE_NAVER_CLIENT_SECRET }}
          VITE_KAKAO_API_KEY: ${{ secrets.VITE_KAKAO_API_KEY }}
          MOTION_TOKEN: ${{ secrets.MOTION_TOKEN }}

      - name: Write Firebase service account
        run: |
          cat > "$RUNNER_TEMP/firebaseServiceAccount.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IENLAB_IENGROUND }}
          JSON

      - name: Deploy preview channel
        id: deploy_preview
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebaseServiceAccount.json
        run: |
          CHANNEL_ID="pr${{ github.event.number }}-${{ github.head_ref }}"
          CHANNEL_ID=$(echo "$CHANNEL_ID" | sed 's/[^[:alnum:]_-]/_/g')

          OUTPUT_FILE="$RUNNER_TEMP/firebase-deploy-output.json"

          npx firebase-tools@15.22.1 hosting:channel:deploy "$CHANNEL_ID" \
            --project ienlab-ienground \
            --expires 4h \
            --only public \
            --json > "$OUTPUT_FILE"

          CHANNEL_URL=$(jq -r '.result[]? | select(.type=="CHANNEL_URL") | .url // empty' "$OUTPUT_FILE")
          if [ -z "$CHANNEL_URL" ]; then
            CHANNEL_URL=$(jq -r '.. | .url? // empty' "$OUTPUT_FILE" | head -n 1)
          fi

          echo "channel_url=$CHANNEL_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: ${{ steps.deploy_preview.outputs.channel_url != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > comment.txt <<EOF
          🚀 Firebase Preview 배포 완료

          - URL: ${{ steps.deploy_preview.outputs.channel_url }}
          EOF

          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.txt